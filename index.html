<!DOCTYPE html>
<html>
    <head>
        <title>
            buttons
        </title>
        <style>
            .subscribe{
                background-color: rgb(214, 2, 2);
                color: white;
                padding-top: 10px;
                padding-bottom: 10px;
                padding-left: 15px;
                padding-right: 15px;
                border-radius: 3px;
                border: none;
                cursor: pointer;
                margin-right: 20px;
                transition: opacity 0.5s,transform 0.5s;
            }
            .subscribe:hover{
                opacity: 0.8;
                transform: scaleX(1.1);
            }
            .subscribe:active{
                opacity: 0.5;
            }
            .join{
                background-color: white;
                padding-top: 9px;
                padding-bottom: 9px;
                padding-left: 15px;
                padding-right: 15px;
                border-color: rgb(11, 109, 224);
                color: rgb(11, 109, 224);
                border-width: 1px;
                border-style: solid;
                border-radius: 3px;
                cursor:pointer;
                margin-right: 20px;
                transition: background-color 0.5s,color 0.5s,transform 0.5s;
            }
            .join:hover{
                background-color: rgb(11, 109, 224);
                color: white;
                transform: scaleX(1.1);
            }
            .join:active{
                opacity: 0.5;
            }
            .tweet{
                background-color: rgb(7, 113, 235);
                border: none;
                padding-top: 10px;
                padding-bottom: 10px;
                padding-left: 15px;
                padding-right: 15px;
                border-radius: 25px;
                color: white;
                cursor: pointer;
                font-weight: bold;
                font-size: 15px;
                transition: box-shadow 0.5s,transform 0.5s;
            }
            .tweet:hover{
                box-shadow: 5px 5px 10px rgba(0,0,0,0.15);
                transform: scaleX(1.1);
            }
        </style>
    </head>
    <body>
        <button class="subscribe">
            SUBSCRIBE
        </button>
        <button class="join">
            JOIN 
        </button>
        <button class="tweet">
            Tweet 
        </button>
    </body>
</html>
